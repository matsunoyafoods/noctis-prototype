<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PEACE TALK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FBF8F4;
  --card: #FFFFFF;
  --primary: #7BAE7F;
  --primary-soft: #E8F3E9;
  --primary-dark: #5A8F5E;
  --accent: #F2A65A;
  --accent-soft: #FFF0E0;
  --text: #3A3A3A;
  --text-light: #8A8A8A;
  --text-lighter: #B5B5B5;
  --border: #EEEBE6;
  --shadow: 0 2px 16px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.08);
  --radius: 16px;
  --radius-sm: 10px;
  --red: #E07070;
  --red-soft: #FDECEC;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Zen Maru Gothic', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 20% 20%, rgba(123,174,127,0.06) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(242,166,90,0.05) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.app {
  position: relative;
  z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* ===== Header ===== */
.header {
  padding: 20px 20px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  box-shadow: 0 2px 8px rgba(123,174,127,0.3);
}

.logo-text {
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 22px;
  letter-spacing: 1px;
  color: var(--text);
}

.logo-text span { color: var(--primary); }

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.settings-btn {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--card);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.2s;
}

.settings-btn:hover { border-color: var(--primary); }

.store-badge {
  font-size: 11px;
  font-weight: 500;
  color: var(--primary-dark);
  background: var(--primary-soft);
  padding: 5px 12px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s;
  border: 1.5px solid transparent;
}

.store-badge:hover { border-color: var(--primary); }

/* AI Status indicator */
.ai-status {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  margin: 0 20px 8px;
}

.ai-status.connected {
  background: var(--primary-soft);
  color: var(--primary-dark);
}

.ai-status.disconnected {
  background: var(--red-soft);
  color: var(--red);
  cursor: pointer;
}

.ai-status .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.ai-status.connected .dot {
  background: var(--primary);
  animation: pulse 2s infinite;
}

.ai-status.disconnected .dot { background: var(--red); }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ===== Main Content ===== */
.main {
  flex: 1;
  padding: 0 16px 40px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* Store Dropdown */
.store-dropdown {
  position: absolute;
  top: 65px;
  right: 16px;
  background: var(--card);
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border);
  z-index: 100;
  overflow: hidden;
  opacity: 0;
  transform: translateY(-8px);
  pointer-events: none;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

.store-dropdown.open {
  opacity: 1;
  transform: translateY(0);
  pointer-events: all;
}

.store-option {
  padding: 12px 20px;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: background 0.15s;
}

.store-option:hover { background: var(--primary-soft); }
.store-option.active { color: var(--primary-dark); font-weight: 700; }
.store-option + .store-option { border-top: 1px solid var(--border); }

/* Greeting */
.greeting {
  padding: 4px 4px;
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.7;
}

.greeting strong {
  color: var(--text);
  font-weight: 700;
  font-size: 18px;
  display: block;
  margin-bottom: 2px;
}

/* Input Card */
.input-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px;
  border: 1.5px solid var(--border);
  transition: border-color 0.3s;
}

.input-card:focus-within { border-color: var(--primary); }

.input-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.input-label::before { content: '✏️'; font-size: 14px; }

textarea {
  width: 100%;
  border: none;
  outline: none;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 16px;
  line-height: 1.7;
  resize: none;
  color: var(--text);
  background: transparent;
  min-height: 80px;
}

textarea::placeholder { color: var(--text-lighter); }

.input-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

.char-count { font-size: 11px; color: var(--text-lighter); }

.convert-btn {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: white;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border: none;
  padding: 10px 24px;
  border-radius: 24px;
  cursor: pointer;
  transition: all 0.25s;
  box-shadow: 0 2px 12px rgba(123,174,127,0.3);
  display: flex;
  align-items: center;
  gap: 6px;
}

.convert-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(123,174,127,0.4);
}

.convert-btn:active { transform: scale(0.97); }
.convert-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* Loading */
.loading-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 32px 20px;
  text-align: center;
  border: 1.5px solid var(--border);
  animation: fadeIn 0.3s ease;
}

.loading-dots {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-bottom: 12px;
}

.loading-dots span {
  width: 10px;
  height: 10px;
  background: var(--primary);
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}

.loading-dots span:nth-child(2) { animation-delay: 0.15s; }
.loading-dots span:nth-child(3) { animation-delay: 0.3s; }

@keyframes bounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

.loading-text { font-size: 13px; color: var(--text-light); }

/* Results */
.results-area {
  display: flex;
  flex-direction: column;
  gap: 12px;
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.result-header {
  font-size: 12px;
  font-weight: 700;
  color: var(--primary-dark);
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 0 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.result-header::before { content: '🕊️'; font-size: 14px; }

.original-msg {
  font-size: 12px;
  color: var(--text-light);
  padding: 8px 12px;
  background: #F5F5F0;
  border-radius: 8px;
  margin-bottom: 4px;
}

.original-msg b { color: var(--text); font-weight: 500; }

.suggestion-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 18px;
  border: 1.5px solid var(--border);
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}

.suggestion-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 4px;
  background: var(--primary);
  border-radius: 0 4px 4px 0;
}

.suggestion-card:nth-child(4)::before { background: var(--accent); }

.suggestion-card:hover {
  border-color: var(--primary);
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}

.suggestion-card:active { transform: scale(0.98); }

.suggestion-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.suggestion-card:nth-child(4) .suggestion-label { color: var(--accent); }

.suggestion-text {
  font-size: 15px;
  line-height: 1.7;
  color: var(--text);
}

/* Error */
.error-card {
  background: var(--red-soft);
  border-radius: var(--radius);
  padding: 18px;
  border: 1.5px solid rgba(224,112,112,0.2);
  animation: fadeIn 0.3s ease;
}

.error-card h4 { font-size: 14px; color: var(--red); margin-bottom: 4px; }
.error-card p { font-size: 13px; color: var(--text-light); }

/* Quick examples */
.quick-examples {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 0 4px;
}

.quick-chip {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 12px;
  color: var(--text-light);
  background: var(--card);
  border: 1px solid var(--border);
  padding: 8px 14px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.quick-chip:hover {
  background: var(--primary-soft);
  border-color: var(--primary);
  color: var(--primary-dark);
}

/* History */
.history-section { margin-top: 8px; }

.history-toggle {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-light);
  background: none;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 4px;
}

.history-toggle:hover { color: var(--text); }

.history-list {
  display: none;
  flex-direction: column;
  gap: 8px;
  margin-top: 8px;
}

.history-list.open { display: flex; animation: fadeIn 0.3s ease; }

.history-item {
  background: var(--card);
  border-radius: var(--radius-sm);
  padding: 14px;
  border: 1px solid var(--border);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}

.history-item:hover { border-color: var(--primary); }

.history-original {
  color: var(--text-light);
  font-size: 11px;
  margin-bottom: 6px;
}

.history-original::before { content: '💬 '; font-size: 10px; }

.history-converted { color: var(--text); line-height: 1.6; }

.history-time { font-size: 10px; color: var(--text-lighter); margin-top: 6px; }

/* ===== Modal ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}

.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.modal {
  background: var(--card);
  border-radius: 20px 20px 0 0;
  padding: 24px 20px 40px;
  width: 100%;
  max-width: 480px;
  max-height: 80vh;
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}

.modal-overlay.open .modal {
  transform: translateY(0);
}

.modal-handle {
  width: 36px;
  height: 4px;
  background: var(--border);
  border-radius: 4px;
  margin: 0 auto 20px;
}

.modal h3 { font-size: 18px; margin-bottom: 16px; }

.modal-field { margin-bottom: 16px; }

.modal-field label {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  display: block;
  margin-bottom: 8px;
}

.modal-field input {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: monospace;
  font-size: 14px;
  color: var(--text);
  background: #FAFAF7;
  outline: none;
  transition: border-color 0.2s;
}

.modal-field input:focus { border-color: var(--primary); }

.modal-field .hint {
  font-size: 11px;
  color: var(--text-lighter);
  margin-top: 6px;
}

.modal-field select {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 14px;
  color: var(--text);
  background: #FAFAF7;
  outline: none;
  appearance: none;
  cursor: pointer;
}

.modal-save {
  font-family: 'Zen Maru Gothic', sans-serif;
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 2px 12px rgba(123,174,127,0.3);
}

.modal-save:hover { transform: translateY(-1px); }
.modal-save:active { transform: scale(0.98); }

/* Toast */
.copied-toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: white;
  padding: 10px 24px;
  border-radius: 24px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 300;
  pointer-events: none;
}

.copied-toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

@media (min-width: 481px) {
  .app {
    margin-top: 16px;
    border-radius: 24px 24px 0 0;
    box-shadow: 0 -4px 32px rgba(0,0,0,0.05);
  }
}
</style>
</head>
<body>

<div class="app" id="app">
  <!-- Header -->
  <header class="header">
    <div class="logo-area">
      <div class="logo-icon">🕊️</div>
      <div class="logo-text">PEACE <span>TALK</span></div>
    </div>
    <div class="header-right">
      <div class="store-badge" id="storeBadge" onclick="toggleStoreDropdown()">🏠 本店</div>
      <div class="settings-btn" onclick="openSettings()">⚙️</div>
    </div>
  </header>

  <!-- Store Dropdown -->
  <div class="store-dropdown" id="storeDropdown">
    <div class="store-option active" data-store="本店" onclick="selectStore(this)"><span>🏠</span> 本店</div>
    <div class="store-option" data-store="2号店" onclick="selectStore(this)"><span>🏢</span> 2号店</div>
  </div>

  <!-- AI Status -->
  <div class="ai-status disconnected" id="aiStatus" onclick="openSettings()">
    <span class="dot"></span>
    <span id="aiStatusText">⚠️ APIキーを設定してください</span>
  </div>

  <!-- Main Content -->
  <main class="main">
    <div class="greeting">
      <strong>やさしい言葉に変換✨</strong>
      メッセージを入力すると、AIが柔らかい表現に変えてくれます
    </div>

    <!-- Input Card -->
    <div class="input-card">
      <div class="input-label">変換したいメッセージ</div>
      <textarea id="messageInput" placeholder="例: 仕込みまだ終わってないよね？" rows="3" maxlength="1200" oninput="updateCharCount()"></textarea>
      <div class="input-footer">
        <span class="char-count" id="charCount">0 / 1200</span>
        <button class="convert-btn" id="convertBtn" onclick="convertMessage()" disabled>
          変換する <span class="arrow">→</span>
        </button>
      </div>
    </div>

    <!-- Quick Examples -->
    <div class="quick-examples" id="quickExamples">
      <div class="quick-chip" onclick="setExample('仕込みまだ終わってないよね？')">仕込みまだ終わってない？</div>
      <div class="quick-chip" onclick="setExample('これやっといてくれない？')">これやっといて</div>
      <div class="quick-chip" onclick="setExample('なんで報告しないの？')">なんで報告しない？</div>
      <div class="quick-chip" onclick="setExample('遅刻しないでよ')">遅刻しないで</div>
      <div class="quick-chip" onclick="setExample('もっと丁寧にやってよ')">もっと丁寧にやって</div>
    </div>

    <!-- Results Area -->
    <div id="resultsArea"></div>

    <!-- History -->
    <div class="history-section" id="historySection" style="display:none">
      <button class="history-toggle" onclick="toggleHistory()">📋 変換履歴 <span id="historyArrow">▼</span></button>
      <div class="history-list" id="historyList"></div>
    </div>
  </main>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>⚙️ 設定</h3>

    <div class="modal-field">
      <label>🔑 Gemini APIキー</label>
      <input type="password" id="apiKeyInput" placeholder="AIzaSy...">
      <div class="hint">Google AI Studioで取得したAPIキーを入力</div>
    </div>

    <div class="modal-field">
      <label>🤖 AIモデル</label>
      <select id="modelSelect">
        <option value="gemini-2.5-flash">Gemini 2.5 Flash（おすすめ💡安くて速い）</option>
        <option value="gemini-2.0-flash">Gemini 2.0 Flash（安定版）</option>
        <option value="gemini-2.5-pro">Gemini 2.5 Pro（高品質・やや高め）</option>
      </select>
    </div>

    <div class="modal-field">
      <label>🏠 店舗名の編集</label>
      <input type="text" id="store1Name" placeholder="本店" style="margin-bottom:8px; font-family: 'Zen Maru Gothic', sans-serif;">
      <input type="text" id="store2Name" placeholder="2号店" style="font-family: 'Zen Maru Gothic', sans-serif;">
    </div>

    <button class="modal-save" onclick="saveSettings()">保存する ✓</button>
  </div>
</div>

<!-- Toast -->
<div class="copied-toast" id="copiedToast">✓ コピーしました</div>

<script>
// --- State ---
const state = {
  apiKey: '',
  model: 'gemini-2.5-flash',
  currentStore: '本店',
  stores: ['本店', '2号店'],
  history: [],
  isConverting: false
};

// --- Load saved settings ---
function loadSettings() {
  try {
    const saved = JSON.parse(localStorage.getItem('peacetalk_settings') || '{}');
    if (saved.apiKey) state.apiKey = saved.apiKey;
    if (saved.model) state.model = saved.model;
    if (saved.stores) state.stores = saved.stores;
    if (saved.history) state.history = saved.history;
  } catch(e) {}
  updateAIStatus();
  renderHistory();
}

function saveSettingsToStorage() {
  try {
    localStorage.setItem('peacetalk_settings', JSON.stringify({
      apiKey: state.apiKey,
      model: state.model,
      stores: state.stores,
      history: state.history
    }));
  } catch(e) {}
}

// --- AI Status ---
function updateAIStatus() {
  const el = document.getElementById('aiStatus');
  const text = document.getElementById('aiStatusText');
  if (state.apiKey) {
    el.className = 'ai-status connected';
    el.onclick = null;
    text.textContent = `🧠 Gemini AI 接続済み（${state.model}）`;
  } else {
    el.className = 'ai-status disconnected';
    el.onclick = openSettings;
    text.textContent = '⚠️ タップしてAPIキーを設定';
  }
}

// --- Settings Modal ---
function openSettings() {
  const modal = document.getElementById('settingsModal');
  document.getElementById('apiKeyInput').value = state.apiKey;
  document.getElementById('modelSelect').value = state.model;
  document.getElementById('store1Name').value = state.stores[0];
  document.getElementById('store2Name').value = state.stores[1];
  modal.classList.add('open');
}

function closeSettings() {
  document.getElementById('settingsModal').classList.remove('open');
}

document.getElementById('settingsModal').addEventListener('click', function(e) {
  if (e.target === this) closeSettings();
});

function saveSettings() {
  const key = document.getElementById('apiKeyInput').value.trim();
  const model = document.getElementById('modelSelect').value;
  const s1 = document.getElementById('store1Name').value.trim() || '本店';
  const s2 = document.getElementById('store2Name').value.trim() || '2号店';

  state.apiKey = key;
  state.model = model;
  state.stores = [s1, s2];

  // Update store UI
  const options = document.querySelectorAll('.store-option');
  options[0].dataset.store = s1;
  options[0].innerHTML = `<span>🏠</span> ${s1}`;
  options[1].dataset.store = s2;
  options[1].innerHTML = `<span>🏢</span> ${s2}`;

  if (state.currentStore === '本店' || !state.stores.includes(state.currentStore)) {
    state.currentStore = s1;
  }
  document.getElementById('storeBadge').textContent = `🏠 ${state.currentStore}`;

  saveSettingsToStorage();
  updateAIStatus();
  closeSettings();
  showToast('✓ 設定を保存しました');
}

// --- Gemini API Call ---
async function callGeminiAPI(message) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${state.model}:generateContent?key=${state.apiKey}`;

  const systemPrompt = `あなたは飲食店の職場コミュニケーションを円滑にするAIアシスタント「PEACE TALK」です。

仕事：スタッフのメッセージを柔らかく協力的なトーンに変換すること。

ルール：
1. 必ず「提案1:」「提案2:」の2つを出す
2. 各提案は1〜2文以内で簡潔に書く（長くしない）
3. 元の意図は保ちつつ、攻撃的・命令的な表現を避ける
4. 飲食店の現場で自然に使える言葉遣いにする
5. 提案以外の説明や前置きは一切不要
6. 敬語は使いすぎず、親しみやすく丁寧な表現にする

出力フォーマット（必ずこの形式で）:
提案1: ○○○○
提案2: ○○○○`;

  const response = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      system_instruction: {
        parts: [{ text: systemPrompt }]
      },
      contents: [{
        parts: [{ text: `以下のメッセージを柔らかく変換してください:\n\n「${message}」` }]
      }],
      generationConfig: {
        temperature: 0.7,
        maxOutputTokens: 4096
      }
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error?.message || `API Error: ${response.status}`);
  }

  const data = await response.json();
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text;

  if (!text) throw new Error('AIからの応答が空でした');

  return parseSuggestions(text);
}

function parseSuggestions(text) {
  const suggestions = [];

  // Try to extract "提案1:" and "提案2:" patterns
  const patterns = [
    /提案\s*1[:：]\s*(.+?)(?=提案\s*2|$)/s,
    /提案\s*2[:：]\s*(.+?)$/s
  ];

  for (const pattern of patterns) {
    const match = text.match(pattern);
    if (match) {
      suggestions.push(match[1].trim().replace(/^[「」]/g, '').replace(/[「」]$/g, '').trim());
    }
  }

  // Fallback: split by newlines
  if (suggestions.length < 2) {
    const lines = text.split('\n').filter(l => l.trim().length > 5);
    while (suggestions.length < 2 && lines.length > 0) {
      const line = lines.shift().replace(/^[\d.、\-\*]+\s*/, '').replace(/^提案\d[:：]\s*/, '').trim();
      if (line && !suggestions.includes(line)) {
        suggestions.push(line);
      }
    }
  }

  // If still not enough, use the whole text
  if (suggestions.length === 0) {
    suggestions.push(text.trim());
  }
  if (suggestions.length === 1) {
    suggestions.push(suggestions[0]);
  }

  return suggestions.slice(0, 2);
}

// --- UI Functions ---
function updateCharCount() {
  const input = document.getElementById('messageInput');
  const count = document.getElementById('charCount');
  const btn = document.getElementById('convertBtn');
  count.textContent = `${input.value.length} / 1200`;
  btn.disabled = input.value.trim().length === 0;
}

function setExample(text) {
  const input = document.getElementById('messageInput');
  input.value = text;
  updateCharCount();
  input.focus();
}

function toggleStoreDropdown() {
  const dd = document.getElementById('storeDropdown');
  dd.classList.toggle('open');
  if (dd.classList.contains('open')) {
    setTimeout(() => {
      document.addEventListener('click', closeDropdownOutside, { once: true });
    }, 10);
  }
}

function closeDropdownOutside(e) {
  const dd = document.getElementById('storeDropdown');
  const badge = document.getElementById('storeBadge');
  if (!dd.contains(e.target) && !badge.contains(e.target)) {
    dd.classList.remove('open');
  }
}

function selectStore(el) {
  const store = el.dataset.store;
  state.currentStore = store;
  document.getElementById('storeBadge').innerHTML = `${el.querySelector('span').textContent} ${store}`;
  document.querySelectorAll('.store-option').forEach(o => o.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('storeDropdown').classList.remove('open');
}

async function convertMessage() {
  if (state.isConverting) return;

  const input = document.getElementById('messageInput');
  const message = input.value.trim();
  if (!message) return;

  // Check API key
  if (!state.apiKey) {
    openSettings();
    return;
  }

  state.isConverting = true;
  const resultsArea = document.getElementById('resultsArea');
  const quickExamples = document.getElementById('quickExamples');

  // Show loading
  resultsArea.innerHTML = `
    <div class="loading-card">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <div class="loading-text">Gemini AIが変換中...</div>
    </div>
  `;
  quickExamples.style.display = 'none';

  try {
    const suggestions = await callGeminiAPI(message);

    resultsArea.innerHTML = `
      <div class="results-area">
        <div class="result-header">変換結果</div>
        <div class="original-msg">元のメッセージ: <b>「${message}」</b></div>
        <div class="suggestion-card" onclick="copySuggestion(this)">
          <div class="suggestion-label">
            提案 1
            <span style="font-size:10px; color:var(--text-lighter)">タップでコピー</span>
          </div>
          <div class="suggestion-text">${suggestions[0]}</div>
        </div>
        <div class="suggestion-card" onclick="copySuggestion(this)">
          <div class="suggestion-label">
            提案 2
            <span style="font-size:10px; color:var(--text-lighter)">タップでコピー</span>
          </div>
          <div class="suggestion-text">${suggestions[1]}</div>
        </div>
      </div>
    `;

    addToHistory(message, suggestions[0]);

  } catch (error) {
    let errorMsg = error.message;
    let errorHint = '設定画面でAPIキーを確認してください。';

    if (errorMsg.includes('API_KEY_INVALID') || errorMsg.includes('401')) {
      errorHint = 'APIキーが正しくないようです。Google AI Studioで再確認してください。';
    } else if (errorMsg.includes('RATE_LIMIT') || errorMsg.includes('429')) {
      errorHint = 'リクエストが多すぎます。少し待ってからもう一度お試しください。';
    } else if (errorMsg.includes('quota')) {
      errorHint = '無料枠の上限に達した可能性があります。しばらく待つか、有料プランに切り替えてください。';
    }

    resultsArea.innerHTML = `
      <div class="error-card">
        <h4>⚠️ 変換できませんでした</h4>
        <p>${errorHint}</p>
        <p style="font-size:11px; color:var(--text-lighter); margin-top:8px;">詳細: ${errorMsg}</p>
      </div>
    `;
  }

  state.isConverting = false;
}

function copySuggestion(card) {
  const text = card.querySelector('.suggestion-text').textContent;
  navigator.clipboard.writeText(text).then(() => {
    showToast('✓ コピーしました');
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✓ コピーしました');
  });
}

function showToast(msg) {
  const toast = document.getElementById('copiedToast');
  toast.textContent = msg || '✓ コピーしました';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1800);
}

function addToHistory(original, converted) {
  const now = new Date();
  const time = `${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;
  state.history.unshift({ original, converted, time, store: state.currentStore });
  if (state.history.length > 20) state.history.pop();
  saveSettingsToStorage();
  renderHistory();
}

function renderHistory() {
  const section = document.getElementById('historySection');
  const list = document.getElementById('historyList');
  if (state.history.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  list.innerHTML = state.history.map(h => `
    <div class="history-item" onclick="copyHistoryItem(this)">
      <div class="history-original">${h.original}</div>
      <div class="history-converted">${h.converted}</div>
      <div class="history-time">${h.store} · ${h.time}</div>
    </div>
  `).join('');
}

function copyHistoryItem(el) {
  const text = el.querySelector('.history-converted').textContent;
  navigator.clipboard.writeText(text).then(() => showToast()).catch(() => {});
}

function toggleHistory() {
  const list = document.getElementById('historyList');
  const arrow = document.getElementById('historyArrow');
  list.classList.toggle('open');
  arrow.textContent = list.classList.contains('open') ? '▲' : '▼';
}

// Keyboard
document.getElementById('messageInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); convertMessage(); }
});

// Init
loadSettings();
</script>

</body>
</html>
